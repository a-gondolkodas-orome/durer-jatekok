<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Dürer játékok</title>
    <script
      data-goatcounter="https://agondolkodasorome.goatcounter.com/count"
      async src="//gc.zgo.at/count.js">
    </script>
    <script>
      window.addEventListener('touchstart', function() {
        document.documentElement.classList.add('using-touch');
      }, { passive: true });
      window.addEventListener('pointermove', function(e) {
        if (e.pointerType === 'mouse') document.documentElement.classList.remove('using-touch');
      }, { passive: true });
    </script>
    <link rel="stylesheet" href="/src/styles.css">
    <link rel="icon" href="data:,">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
